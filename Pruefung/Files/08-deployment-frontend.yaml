apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-frontend
  labels:
    app: counter-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: counter-frontend
  template:
    metadata:
      labels:
        app: counter-frontend
    spec:
      containers:
        - name: counter-frontend
          image: ghcr.io/<YOUR_GITHUB_USERNAME>/counter-frontend:v1  # <-- Anpassen
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            # NPM-Cache Workaround (nodejs/docker-node#1749)
            - name: npm_config_cache
              value: ./.npm-cache
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BACKEND_URL
              value: "https://counter-backend.<YOUR_OPENSHIFT_APPS_DOMAIN>"  # <-- Anpassen
