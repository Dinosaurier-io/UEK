<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine moderne Webseite</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #1e293b;
        }

        nav a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 Meine moderne Webseite</h1>
    <p>Stylisch, einfach & erweiterbar</p>
</header>

<nav>
    <a href="#">Start</a>
    <a href="#">Über mich</a>
    <a href="#">Kontakt</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Startseite</h2>
        <p>Diese Version ist moderner gestaltet mit Karten-Layout und Dark Mode.</p>
        <button onclick="zeigeNachricht()">Klick mich</button>
    </div>

    <div class="card">
        <h2>Über mich</h2>
        <p>Hier kannst du Infos über dich hinzufügen.</p>
    </div>
</div>

<footer>
    <p>&copy; 2026 Meine Webseite</p>
</footer>

<script>
    function zeigeNachricht() {
        alert("Button funktioniert 🎉");
    }
</script>

</body>
</html>
